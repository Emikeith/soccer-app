<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City United SC App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body class="bg-gray-50 font-sans pb-20 text-gray-900">

    <!-- TOP NAVIGATION -->
    <header class="bg-green-700 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <h1 class="text-xl font-black tracking-tighter">CITY UNITED SC</h1>
            <button onclick="toggleMenu()" class="p-2 outline-none">
                <i class="fas fa-bars text-2xl" id="menu-icon"></i>
            </button>
        </div>
    </header>

    <!-- MOBILE SIDE MENU -->
    <div id="side-menu" class="fixed inset-0 bg-black bg-opacity-50 z-[60] hidden transition-opacity duration-300">
        <div class="bg-white w-3/4 h-full p-6 space-y-6">
            <div class="flex justify-between items-center border-b pb-4">
                <span class="font-bold text-lg">Menu</span>
                <button onclick="toggleMenu()"><i class="fas fa-times text-xl"></i></button>
            </div>
            <nav class="flex flex-col space-y-4 font-medium">
                <a href="#" class="flex items-center gap-3 py-2" onclick="showPage('home')"><i class="fas fa-home w-6"></i> Home</a>
                <a href="#" class="flex items-center gap-3 py-2" onclick="showPage('schedule')"><i class="fas fa-calendar-alt w-6"></i> Schedule</a>
                <a href="#" class="flex items-center gap-3 py-2" onclick="showPage('stats')"><i class="fas fa-chart-bar w-6"></i> Statistics</a>
                <a href="#" class="flex items-center gap-3 py-2" onclick="showPage('admin')"><i class="fas fa-user-shield w-6"></i> Manager Login</a>
                <hr>
                <a href="#" class="flex items-center gap-3 py-2"><i class="fas fa-book w-6"></i> By-Laws</a>
            </nav>
        </div>
    </div>

    <!-- MAIN CONTENT AREA -->
    <main class="max-w-md mx-auto p-4 space-y-6">

        <!-- PAGE: HOME -->
        <section id="home" class="page active space-y-6">
            <div class="rounded-2xl overflow-hidden shadow-lg bg-black aspect-video relative group">
                <div class="absolute inset-0 flex items-center justify-center bg-green-900 bg-opacity-20">
                    <i class="fas fa-play-circle text-6xl text-white opacity-90 transition-transform group-active:scale-90"></i>
                </div>
            </div>

            <!-- DYNAMIC RSVP CARD -->
            <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100">
                <div class="flex items-center gap-2 mb-1">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <h2 class="text-xs font-extrabold text-green-600 uppercase tracking-widest">Live RSVP</h2>
                </div>
                <p class="text-2xl font-black text-gray-800" id="next-game-date">Loading next game...</p>
                <p class="text-sm text-gray-500 font-medium mt-1" id="next-game-loc">Please wait...</p>
                
                <div class="grid grid-cols-2 gap-3 mt-5">
                    <button onclick="submitRSVP('In')" class="bg-green-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-green-200 active:bg-green-700 transition-all">I'M IN</button>
                    <button onclick="submitRSVP('Out')" class="bg-gray-100 text-gray-600 py-4 rounded-2xl font-bold active:bg-gray-200 transition-all">I'M OUT</button>
                </div>
            </div>
        </section>

        <!-- PAGE: SCHEDULE -->
        <section id="schedule" class="page space-y-4">
            <h2 class="text-2xl font-bold">Game Schedule</h2>
            <div id="schedule-container" class="space-y-3">
                <p class="text-center text-gray-400 py-10">Loading games from sheet...</p>
            </div>
        </section>

        <!-- PAGE: STATS -->
        <section id="stats" class="page">
            <h2 class="text-2xl font-bold mb-4">Top Scorers</h2>
            <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100">
                <div class="p-4 border-b bg-gray-50 flex justify-between font-bold text-xs uppercase text-gray-500">
                    <span>Player</span>
                    <span>Goals</span>
                </div>
                <div id="stats-container" class="divide-y divide-gray-50">
                    <p class="p-4 text-center text-gray-400">Loading stats...</p>
                </div>
            </div>
        </section>

        <!-- PAGE: ADMIN -->
        <section id="admin" class="page space-y-6">
            <div id="admin-login-view" class="bg-white p-8 rounded-3xl shadow-sm border text-center">
                <i class="fas fa-lock text-4xl text-gray-300 mb-4"></i>
                <h2 class="text-xl font-bold mb-2">Manager Access</h2>
                <input type="password" id="admin-pass" placeholder="Enter Access Code" class="w-full p-3 border rounded-xl mb-4 text-center">
                <button onclick="checkAdmin()" class="w-full bg-gray-900 text-white py-3 rounded-xl font-bold">Login</button>
            </div>

            <div id="admin-dashboard" class="hidden space-y-6">
                <!-- Live Balance Overview -->
                <div id="team-balance-overview" class="grid grid-cols-2 gap-2 text-center text-[10px] font-bold uppercase tracking-tight">
                    <!-- JS will fill this -->
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border space-y-4">
                    <h3 class="text-sm font-bold text-gray-400 uppercase">Add New Player</h3>
                    <input type="text" id="reg-name" placeholder="Full Name" class="w-full p-3 bg-gray-50 border rounded-xl">
                    <input type="email" id="reg-email" placeholder="Email Address" class="w-full p-3 bg-gray-50 border rounded-xl">
                    <button onclick="registerNewPlayer()" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold">Add to Roster</button>
                </div>
                
                <div id="roster-container" class="space-y-2">
                    <!-- Players will load here -->
                </div>
            </div>
        </section>
    </main>

    <!-- ASSIGNMENT MODAL (POPUP) -->
    <div id="edit-modal" class="fixed inset-0 bg-black/50 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-xs rounded-3xl p-6 space-y-4 shadow-2xl">
            <h3 id="modal-player-name" class="font-black text-xl text-gray-800">Assign Team</h3>
            <input type="hidden" id="modal-player-email">
            
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase">Select Team</label>
                <select id="modal-team" class="w-full p-4 bg-gray-100 rounded-2xl mt-1 font-bold outline-none border-none">
                    <option value="Unassigned">Unassigned</option>
                    <option value="Team A">Team A</option>
                    <option value="Team B">Team B</option>
                    <option value="Team C">Team C</option>
                    <option value="Team D">Team D</option>
                </select>
            </div>

            <div class="flex gap-2 pt-2">
                <button onclick="closeModal()" class="flex-1 py-4 font-bold text-gray-400">Cancel</button>
                <button onclick="savePlayerUpdate()" class="flex-1 py-4 bg-green-600 text-white rounded-2xl font-bold shadow-lg">Update</button>
            </div>
        </div>
    </div>

    <!-- BOTTOM TAB NAVIGATION -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex justify-around items-center p-3 z-50 shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
        <button onclick="showPage('home')" id="btn-home" class="nav-btn flex flex-col items-center gap-1 text-green-600">
            <i class="fas fa-home text-xl"></i>
            <span class="text-[10px] font-bold">Home</span>
        </button>
        <button onclick="showPage('schedule')" id="btn-schedule" class="nav-btn flex flex-col items-center gap-1 text-gray-400">
            <i class="fas fa-calendar-alt text-xl"></i>
            <span class="text-[10px] font-bold">Schedule</span>
        </button>
        <button onclick="showPage('stats')" id="btn-stats" class="nav-btn flex flex-col items-center gap-1 text-gray-400">
            <i class="fas fa-chart-line text-xl"></i>
            <span class="text-[10px] font-bold">Stats</span>
        </button>
        <button onclick="showPage('admin')" id="btn-admin" class="nav-btn flex flex-col items-center gap-1 text-gray-400">
            <i class="fas fa-user-shield text-xl"></i>
            <span class="text-[10px] font-bold">Admin</span>
        </button>
    </nav>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbylqbNydbvOsStKOXgVJ0FBYUjlnQsuLzmWi8rHWNR2kOOpdGclZiSq_ani-CJOv3E/exec';

        function toggleMenu() {
            const menu = document.getElementById('side-menu');
            menu.classList.toggle('hidden');
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.replace('text-green-600', 'text-gray-400'));
            document.getElementById('btn-' + pageId).classList.replace('text-gray-400', 'text-green-600');
            
            document.getElementById('side-menu').classList.add('hidden');
            window.scrollTo(0, 0);

            if(pageId === 'schedule') loadSchedule();
            if(pageId === 'stats') loadStats();
            if(pageId === 'admin' && !document.getElementById('admin-dashboard').classList.contains('hidden')) loadRoster();
        }

        async function submitRSVP(status) {
            const email = prompt("Enter email to confirm RSVP:");
            if(!email) return;
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'submitRSVP', email: email, status: status, gameId: 'G1' })
                });
                alert("RSVP Recorded!");
            } catch(e) { alert("Error saving RSVP"); }
        }

        async function registerNewPlayer() {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            if(!name || !email) return alert("Fields required");
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: 'registerPlayer', name: name, email: email })
            });
            alert("Player added!");
            loadRoster();
        }

        async function loadSchedule() {
            const res = await fetch(SCRIPT_URL + "?action=getGames");
            const games = await res.json();
            const container = document.getElementById('schedule-container');
            container.innerHTML = games.map(g => `
                <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-green-500">
                    <p class="font-bold">${g.date}</p>
                    <p class="text-sm text-gray-500">${g.time} | ${g.loc}</p>
                </div>
            `).join('');
            
            if(games[0]) {
                document.getElementById('next-game-date').innerText = games[0].date;
                document.getElementById('next-game-loc').innerText = `${games[0].time} • ${games[0].loc}`;
            }
        }

        async function loadStats() {
            const res = await fetch(SCRIPT_URL + "?action=getStats");
            const stats = await res.json();
            document.getElementById('stats-container').innerHTML = stats.map(s => `
                <div class="p-4 flex justify-between"><span>${s.player}</span> <span class="font-bold">${s.goals}</span></div>
            `).join('');
        }

        // --- NEW MANAGEMENT FUNCTIONS ---

        async function loadRoster() {
            const res = await fetch(SCRIPT_URL + "?action=getPlayers");
            const players = await res.json();
            
            // Calculate Team Balance for the overview
            const counts = { "Team A": 0, "Team B": 0, "Team C": 0, "Team D": 0 };
            players.forEach(p => { if(counts[p.team] !== undefined) counts[p.team]++; });
            
            document.getElementById('team-balance-overview').innerHTML = Object.entries(counts).map(([name, count]) => `
                <div class="bg-white p-3 rounded-xl border border-gray-100 shadow-sm">
                    <div class="text-gray-400">${name}</div>
                    <div class="text-lg font-black text-green-600">${count}</div>
                </div>
            `).join('');

            // Render Roster List
            document.getElementById('roster-container').innerHTML = players.map(p => `
                <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-gray-50">
                    <div>
                        <p class="font-bold">${p.name}</p>
                        <p class="text-xs ${p.team === 'Unassigned' ? 'text-red-500 font-bold' : 'text-gray-400'}">
                            ${p.team} | ${p.role}
                        </p>
                    </div>
                    <button onclick="openEditModal('${p.name}', '${p.email}', '${p.team}')" class="text-green-600 font-bold text-xs border border-green-200 px-3 py-1 rounded-lg bg-green-50">Manage</button>
                </div>
            `).join('');
        }

        function openEditModal(name, email, team) {
            document.getElementById('modal-player-name').innerText = name;
            document.getElementById('modal-player-email').value = email;
            document.getElementById('modal-team').value = team;
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('edit-modal').classList.add('hidden');
        }

        async function savePlayerUpdate() {
            const email = document.getElementById('modal-player-email').value;
            const team = document.getElementById('modal-team').value;

            // Using no-cors for POST as usual with Apps Script
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    action: 'updatePlayer',
                    email: email,
                    team: team,
                    role: 'Player'
                })
            });

            closeModal();
            // Give Google a second to process before refreshing
            setTimeout(loadRoster, 500);
        }

        function checkAdmin() {
            if(document.getElementById('admin-pass').value === '1234') {
                document.getElementById('admin-login-view').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                loadRoster();
            } else { alert("Wrong code"); }
        }

        window.onload = loadSchedule;
    </script>
</body>
</html>
