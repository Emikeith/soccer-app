<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City United SC App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .page { display: none; }
        .page.active { display: block; }
        .nav-btn.active { color: #15803d; } /* green-700 */
    </style>
</head>
<body class="bg-gray-50 font-sans pb-24 text-gray-900">

    <!-- TOP NAVIGATION -->
    <header class="bg-green-700 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <h1 class="text-xl font-black tracking-tighter">CITY UNITED SC</h1>
            <button onclick="toggleMenu()" class="p-2 outline-none">
                <i class="fas fa-bars text-2xl" id="menu-icon"></i>
            </button>
        </div>
    </header>

    <!-- MOBILE SIDE MENU -->
    <div id="side-menu" class="fixed inset-0 bg-black bg-opacity-50 z-[60] hidden transition-opacity duration-300">
        <div class="bg-white w-3/4 h-full p-6 space-y-6">
            <div class="flex justify-between items-center border-b pb-4">
                <span class="font-bold text-lg">Menu</span>
                <button onclick="toggleMenu()"><i class="fas fa-times text-xl"></i></button>
            </div>
            <nav class="flex flex-col space-y-4 font-medium">
                <a href="#" class="flex items-center gap-3 py-2" onclick="showPage('home')"><i class="fas fa-home w-6"></i> Home</a>
                <a href="#" class="flex items-center gap-3 py-2" onclick="showPage('teams')"><i class="fas fa-users w-6"></i> Teams</a>
                <a href="#" class="flex items-center gap-3 py-2" onclick="showPage('schedule')"><i class="fas fa-calendar-alt w-6"></i> Schedule</a>
                <a href="#" class="flex items-center gap-3 py-2" onclick="showPage('stats')"><i class="fas fa-chart-bar w-6"></i> Statistics</a>
                <a href="#" class="flex items-center gap-3 py-2" onclick="showPage('admin')"><i class="fas fa-user-shield w-6"></i> Manager Login</a>
                <hr>
                <a href="#" class="flex items-center gap-3 py-2"><i class="fas fa-book w-6"></i> By-Laws</a>
            </nav>
        </div>
    </div>

    <!-- MAIN CONTENT AREA -->
    <main class="max-w-md mx-auto p-4 space-y-6">

        <!-- PAGE: HOME -->
        <section id="home" class="page active space-y-6">
            <div class="rounded-2xl overflow-hidden shadow-lg bg-black aspect-video relative group">
                <div class="absolute inset-0 flex items-center justify-center bg-green-900 bg-opacity-20">
                    <i class="fas fa-play-circle text-6xl text-white opacity-90 transition-transform group-active:scale-90"></i>
                </div>
            </div>

            <!-- DYNAMIC RSVP CARD -->
            <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100">
                <div class="flex items-center gap-2 mb-1">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <h2 class="text-xs font-extrabold text-green-600 uppercase tracking-widest">Live RSVP</h2>
                </div>
                <p class="text-2xl font-black text-gray-800" id="next-game-date">Loading next game...</p>
                <p class="text-sm text-gray-500 font-medium mt-1" id="next-game-loc">Please wait...</p>
                
                <div class="grid grid-cols-2 gap-3 mt-5">
                    <button id="btn-rsvp-in" onclick="submitRSVP('In')" class="bg-green-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-green-200 active:bg-green-700 transition-all disabled:opacity-50">I'M IN</button>
                    <button id="btn-rsvp-out" onclick="submitRSVP('Out')" class="bg-gray-100 text-gray-600 py-4 rounded-2xl font-bold active:bg-gray-200 transition-all disabled:opacity-50">I'M OUT</button>
                </div>
            </div>
        </section>

        <!-- PAGE: TEAMS VIEW -->
        <section id="teams" class="page space-y-4">
            <div class="flex justify-between items-center px-1">
                <h2 class="text-2xl font-black uppercase italic tracking-tight">Teams</h2>
                <select id="team-filter" onchange="renderTeams()" class="bg-white border-none text-[10px] font-black uppercase tracking-widest text-green-700 outline-none">
                    <option value="All">All Rosters</option>
                    <option value="Team A">Team A</option>
                    <option value="Team B">Team B</option>
                    <option value="Team C">Team C</option>
                    <option value="Team D">Team D</option>
                </select>
            </div>

            <div class="flex bg-gray-100 p-1 rounded-xl mb-4">
                <button onclick="setStream('Wed')" id="btn-wed-toggle" class="flex-1 py-2 text-[10px] font-black uppercase rounded-lg bg-white shadow-sm transition-all">Wednesday</button>
                <button onclick="setStream('Sat')" id="btn-sat-toggle" class="flex-1 py-2 text-[10px] font-black uppercase text-gray-400 transition-all">Saturday</button>
            </div>

            <div id="teams-grid" class="space-y-4">
                <p class="text-center text-gray-400 py-10">Loading rosters...</p>
            </div>
        </section>

        <!-- PAGE: SCHEDULE -->
        <section id="schedule" class="page space-y-4">
            <h2 class="text-2xl font-bold italic uppercase tracking-tighter">Game Schedule</h2>
            <div id="schedule-container" class="space-y-4">
                <p class="text-center text-gray-400 py-10">Loading games...</p>
            </div>
        </section>

        <!-- PAGE: STATS -->
        <section id="stats" class="page">
            <h2 class="text-2xl font-bold mb-4">Top Scorers</h2>
            <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100">
                <div class="p-4 border-b bg-gray-50 flex justify-between font-bold text-xs uppercase text-gray-500">
                    <span>Player</span>
                    <span>Goals</span>
                </div>
                <div id="stats-container" class="divide-y divide-gray-50">
                    <p class="p-4 text-center text-gray-400">Loading stats...</p>
                </div>
            </div>
        </section>

        <!-- PAGE: ADMIN -->
        <section id="admin" class="page space-y-6">
            <div id="admin-login-view" class="bg-white p-8 rounded-3xl shadow-sm border text-center">
                <i class="fas fa-lock text-4xl text-gray-300 mb-4"></i>
                <h2 class="text-xl font-bold mb-2">Manager Access</h2>
                <input type="password" id="admin-pass" placeholder="Enter Access Code" class="w-full p-3 border rounded-xl mb-4 text-center">
                <button onclick="checkAdmin()" class="w-full bg-gray-900 text-white py-3 rounded-xl font-bold">Login</button>
            </div>

            <div id="admin-dashboard" class="hidden space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border space-y-4">
                    <h3 class="text-sm font-bold text-gray-400 uppercase">Add New Player</h3>
                    <input type="text" id="reg-name" placeholder="Full Name" class="w-full p-3 bg-gray-50 border rounded-xl">
                    <input type="email" id="reg-email" placeholder="Email Address" class="w-full p-3 bg-gray-50 border rounded-xl">
                    <button onclick="registerNewPlayer()" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold">Add to Roster</button>
                </div>
                <div id="roster-container" class="space-y-2"></div>
            </div>
        </section>
    </main>

    <!-- MODAL -->
    <div id="edit-modal" class="fixed inset-0 bg-black/50 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-xs rounded-3xl p-6 space-y-4 shadow-2xl">
            <h3 id="modal-player-name" class="font-black text-xl text-gray-800">Assign Team</h3>
            <input type="hidden" id="modal-player-email">
            
            <div class="flex bg-gray-100 p-1 rounded-xl mb-2">
                <button id="modal-btn-wed" onclick="setModalStream('Wed')" class="flex-1 py-1 text-[9px] font-black uppercase rounded-lg bg-white shadow-sm transition-all">Wed</button>
                <button id="modal-btn-sat" onclick="setModalStream('Sat')" class="flex-1 py-1 text-[9px] font-black uppercase text-gray-400 transition-all">Sat</button>
            </div>

            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase">Select Team</label>
                <select id="modal-team" class="w-full p-4 bg-gray-100 rounded-2xl mt-1 font-bold outline-none border-none">
                    <option value="Unassigned">Unassigned</option>
                    <option value="Team A">Team A</option>
                    <option value="Team B">Team B</option>
                    <option value="Team C">Team C</option>
                    <option value="Team D">Team D</option>
                </select>
            </div>

            <div class="flex gap-2 pt-2">
                <button onclick="closeModal()" class="flex-1 py-4 font-bold text-gray-400">Cancel</button>
                <button onclick="savePlayerUpdate()" class="flex-1 py-4 bg-green-600 text-white rounded-2xl font-bold shadow-lg">Update</button>
            </div>
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex justify-around items-center p-3 z-50 shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
        <button onclick="showPage('home')" id="btn-home" class="nav-btn flex flex-col items-center gap-1 text-green-600">
            <i class="fas fa-home text-xl"></i>
            <span class="text-[10px] font-bold">Home</span>
        </button>
        <button onclick="showPage('teams')" id="btn-teams" class="nav-btn flex flex-col items-center gap-1 text-gray-400">
            <i class="fas fa-users text-xl"></i>
            <span class="text-[10px] font-bold">Teams</span>
        </button>
        <button onclick="showPage('schedule')" id="btn-schedule" class="nav-btn flex flex-col items-center gap-1 text-gray-400">
            <i class="fas fa-calendar-alt text-xl"></i>
            <span class="text-[10px] font-bold">Schedule</span>
        </button>
        <button onclick="showPage('stats')" id="btn-stats" class="nav-btn flex flex-col items-center gap-1 text-gray-400">
            <i class="fas fa-chart-line text-xl"></i>
            <span class="text-[10px] font-bold">Stats</span>
        </button>
        <button onclick="showPage('admin')" id="btn-admin" class="nav-btn flex flex-col items-center gap-1 text-gray-400">
            <i class="fas fa-user-shield text-xl"></i>
            <span class="text-[10px] font-bold">Admin</span>
        </button>
    </nav>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzEq4NHzx0FCGQnTGbdfKZpjVhOa6-zIUcoPpUMdW0XyAT2MJyn62M7tKo_aE58u1uL/exec'; 
        let allPlayersData = []; 
        let currentStream = 'Wed';
        let modalStream = 'Wed'; // For targeted manager updates

        function toggleMenu() { document.getElementById('side-menu').classList.toggle('hidden'); }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-green-600');
                btn.classList.add('text-gray-400');
            });
            document.getElementById('btn-' + pageId).classList.replace('text-gray-400', 'text-green-600');
            
            document.getElementById('side-menu').classList.add('hidden');
            window.scrollTo(0, 0);

            if(pageId === 'teams') loadTeamsData();
            if(pageId === 'schedule') loadSchedule();
            if(pageId === 'stats') loadStats();
        }

        async function loadTeamsData() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getPlayers`);
                allPlayersData = await res.json();
                renderTeams();
            } catch(e) { console.error("Error loading teams", e); }
        }

        function setStream(stream) {
            currentStream = stream;
            document.getElementById('btn-wed-toggle').className = stream === 'Wed' ? "flex-1 py-2 text-[10px] font-black uppercase rounded-lg bg-white shadow-sm" : "flex-1 py-2 text-[10px] font-black uppercase text-gray-400";
            document.getElementById('btn-sat-toggle').className = stream === 'Sat' ? "flex-1 py-2 text-[10px] font-black uppercase rounded-lg bg-white shadow-sm" : "flex-1 py-2 text-[10px] font-black uppercase text-gray-400";
            renderTeams();
        }

        function renderTeams() {
            const filter = document.getElementById('team-filter').value;
            const container = document.getElementById('teams-grid');
            const teamNames = ["Team A", "Team B", "Team C", "Team D"];
            const teamField = currentStream === 'Wed' ? 'Team Wed' : 'Team Sat';
            
            container.innerHTML = teamNames.filter(t => filter === "All" || filter === t).map(teamName => {
                const teamPlayers = allPlayersData.filter(p => p[teamField] === teamName);
                return `
                    <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                        <div class="px-5 py-4 border-b border-gray-50 flex justify-between items-center bg-gray-50/30">
                            <div>
                                <span class="font-black text-gray-800 uppercase italic tracking-tighter">${teamName}</span>
                                <p class="text-[8px] font-bold text-gray-400 uppercase tracking-widest">${currentStream === 'Wed' ? 'Wednesday' : 'Saturday'}</p>
                            </div>
                            <span class="text-[10px] font-black text-green-600 bg-green-50 px-3 py-1 rounded-full">${teamPlayers.length} Members</span>
                        </div>
                        <div class="divide-y divide-gray-50">
                            ${teamPlayers.length > 0 ? teamPlayers.map(p => `
                                <div class="p-4 flex items-center gap-4">
                                    <div class="w-10 h-10 bg-gray-50 rounded-full flex items-center justify-center text-sm font-black text-gray-300 border border-gray-100">${(p.Name || "U").charAt(0)}</div>
                                    <div>
                                        <p class="font-bold text-gray-800 text-sm">${p.Name}</p>
                                        <p class="text-[9px] font-black uppercase tracking-widest text-gray-400">${p.Role || 'Player'}</p>
                                    </div>
                                </div>
                            `).join('') : '<p class="p-6 text-xs text-gray-400 italic text-center font-bold">No Players Assigned</p>'}
                        </div>
                    </div>`;
            }).join('');
        }

        async function loadSchedule() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getGames`);
                const games = await res.json();
                const container = document.getElementById('schedule-container');
                container.innerHTML = games.map(g => `
                    <div class="bg-white p-5 rounded-3xl shadow-sm border border-green-100">
                        <div class="flex justify-between items-start mb-3">
                            <p class="text-lg font-black text-gray-800">${g.Date || g.date}</p>
                            <div class="text-right text-gray-400">
                                <p class="text-xs font-bold">${g.Time || g.time}</p>
                                <p class="text-[10px]">${g.Location || g.location}</p>
                            </div>
                        </div>
                        <div class="bg-gray-50 rounded-2xl p-4 flex items-center justify-around border border-gray-100 font-black text-xs uppercase">
                            <span>${(g.Matchup || g.matchup || "TBA").split(' vs ')[0]}</span>
                            <span class="text-gray-300 italic">VS</span>
                            <span>${(g.Matchup || g.matchup || "TBA").split(' vs ')[1] || "TBA"}</span>
                        </div>
                    </div>`).join('');
                if(games[0]) {
                    document.getElementById('next-game-date').innerText = games[0].Date || games[0].date;
                    document.getElementById('next-game-loc').innerText = `${games[0].Matchup || games[0].matchup} • ${games[0].Location || games[0].location}`;
                }
            } catch(e) { console.error(e); }
        }

        async function submitRSVP(status) {
            const date = document.getElementById('next-game-date').innerText;
            const email = prompt("Enter email to confirm RSVP:");
            if(!email) return;
            
            const btnIn = document.getElementById('btn-rsvp-in');
            const btnOut = document.getElementById('btn-rsvp-out');
            btnIn.disabled = btnOut.disabled = true;

            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'submitRSVP', email, status, gameDate: date }) });
            alert("RSVP Recorded!");
            btnIn.disabled = btnOut.disabled = false;
        }

        // MANAGER FUNCTIONS
        function setModalStream(stream) {
            modalStream = stream;
            document.getElementById('modal-btn-wed').className = stream === 'Wed' ? "flex-1 py-1 text-[9px] font-black uppercase rounded-lg bg-white shadow-sm" : "flex-1 py-1 text-[9px] font-black uppercase text-gray-400";
            document.getElementById('modal-btn-sat').className = stream === 'Sat' ? "flex-1 py-1 text-[9px] font-black uppercase rounded-lg bg-white shadow-sm" : "flex-1 py-1 text-[9px] font-black uppercase text-gray-400";
        }

        async function loadRoster() {
            const res = await fetch(`${SCRIPT_URL}?action=getPlayers`);
            const players = await res.json();
            document.getElementById('roster-container').innerHTML = players.map(p => `
                <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-gray-50">
                    <div>
                        <p class="font-bold">${p.Name}</p>
                        <p class="text-[9px] text-gray-400 uppercase font-black">W: ${p['Team Wed'] || 'None'} | S: ${p['Team Sat'] || 'None'}</p>
                    </div>
                    <button onclick="openEditModal('${p.Name}', '${p.Email}')" class="text-green-600 font-bold text-xs border border-green-200 px-3 py-1 rounded-lg">Manage</button>
                </div>`).join('');
        }

        function openEditModal(name, email) {
            document.getElementById('modal-player-name').innerText = name;
            document.getElementById('modal-player-email').value = email;
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('edit-modal').classList.add('hidden'); }

        async function savePlayerUpdate() {
            const email = document.getElementById('modal-player-email').value;
            const team = document.getElementById('modal-team').value;
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'updatePlayer', email, team, stream: modalStream }) });
            closeModal();
            setTimeout(loadRoster, 800);
        }

        function checkAdmin() {
            if(document.getElementById('admin-pass').value === '1234') {
                document.getElementById('admin-login-view').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                loadRoster();
            } else { alert("Wrong code"); }
        }

        window.onload = loadSchedule;
    </script>
</body>
</html>
