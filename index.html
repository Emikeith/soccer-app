<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City United SC App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .page { display: none; }
        .page.active { display: block; }
        .nav-btn.active { color: #15803d; }
    </style>
</head>
<body class="bg-gray-50 font-sans pb-24 text-gray-900">

    <header class="bg-green-700 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <h1 class="text-xl font-black tracking-tighter">CITY UNITED SC</h1>
            <button onclick="toggleMenu()" class="p-2 outline-none">
                <i class="fas fa-bars text-2xl" id="menu-icon"></i>
            </button>
        </div>
    </header>

    <div id="side-menu" class="fixed inset-0 bg-black bg-opacity-50 z-[60] hidden transition-opacity duration-300">
        <div class="bg-white w-3/4 h-full p-6 space-y-6">
            <div class="flex justify-between items-center border-b pb-4">
                <span class="font-bold text-lg">Menu</span>
                <button onclick="toggleMenu()"><i class="fas fa-times text-xl"></i></button>
            </div>
            <nav class="flex flex-col space-y-4 font-medium">
                <a href="#" class="flex items-center gap-3 py-2" onclick="showPage('home')"><i class="fas fa-home w-6"></i> Home</a>
                <a href="#" class="flex items-center gap-3 py-2" onclick="showPage('teams')"><i class="fas fa-users w-6"></i> Teams</a>
                <a href="#" class="flex items-center gap-3 py-2" onclick="showPage('schedule')"><i class="fas fa-calendar-alt w-6"></i> Schedule</a>
                <a href="#" class="flex items-center gap-3 py-2" onclick="showPage('stats')"><i class="fas fa-chart-bar w-6"></i> Statistics</a>
                <a href="#" class="flex items-center gap-3 py-2" onclick="showPage('admin')"><i class="fas fa-user-shield w-6"></i> Admin</a>
            </nav>
        </div>
    </div>

    <main class="max-w-md mx-auto p-4 space-y-6">

        <section id="home" class="page active space-y-6">
            <div class="rounded-2xl overflow-hidden shadow-lg bg-black aspect-video relative group flex items-center justify-center">
                <i class="fas fa-play-circle text-6xl text-white opacity-90 transition-transform group-active:scale-90"></i>
            </div>

            <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100">
                <div class="flex items-center gap-2 mb-1">
                    <span id="rsvp-dot" class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <h2 id="rsvp-header" class="text-xs font-extrabold text-green-600 uppercase tracking-widest">Live RSVP</h2>
                </div>
                <p class="text-2xl font-black text-gray-800" id="next-game-date">Loading...</p>
                <p class="text-sm text-gray-500 font-medium mt-1" id="next-game-loc">Please wait...</p>
                
                <div id="next-game-matchups" class="mt-4 space-y-2"></div>
                <div id="next-game-jersey" class="mt-4 text-[10px] font-bold text-green-700 bg-green-50 inline-block px-2 py-1 rounded"></div>
                
                <div id="rsvp-controls" class="grid grid-cols-2 gap-3 mt-5">
                    <button onclick="submitRSVP('In')" class="bg-green-600 text-white py-4 rounded-2xl font-bold shadow-lg active:bg-green-700 transition-all">I'M IN</button>
                    <button onclick="submitRSVP('Out')" class="bg-gray-100 text-gray-600 py-4 rounded-2xl font-bold active:bg-gray-200 transition-all">I'M OUT</button>
                </div>
            </div>
        </section>

        <section id="teams" class="page space-y-4">
            <div class="flex justify-between items-center px-1">
                <h2 class="text-2xl font-black uppercase italic tracking-tight">Teams</h2>
                <select id="team-filter" onchange="renderTeams()" class="bg-white border-none text-[10px] font-black uppercase tracking-widest text-green-700 outline-none">
                    <option value="All">All Rosters</option>
                    <option value="Team A">Team A</option>
                    <option value="Team B">Team B</option>
                    <option value="Team C">Team C</option>
                    <option value="Team D">Team D</option>
                </select>
            </div>
            <div class="flex bg-gray-100 p-1 rounded-xl mb-4">
                <button onclick="setStream('Wed')" id="btn-wed-toggle" class="flex-1 py-2 text-[10px] font-black uppercase rounded-lg bg-white shadow-sm transition-all">Wednesday</button>
                <button onclick="setStream('Sat')" id="btn-sat-toggle" class="flex-1 py-2 text-[10px] font-black uppercase text-gray-400 transition-all">Saturday</button>
            </div>
            <div id="teams-grid" class="space-y-4"></div>
        </section>

        <section id="schedule" class="page space-y-4">
            <h2 class="text-2xl font-bold italic uppercase tracking-tighter">Game Schedule</h2>
            <div id="schedule-container" class="space-y-4"></div>
        </section>

        <section id="stats" class="page space-y-4">
            <h2 class="text-2xl font-black italic uppercase tracking-tighter px-1">Top Scorers</h2>
            <div id="stats-container" class="space-y-3"></div>
        </section>

        <section id="admin" class="page space-y-6">
            <div id="admin-login-view" class="bg-white p-8 rounded-3xl shadow-sm border text-center">
                <i class="fas fa-lock text-4xl text-gray-300 mb-4"></i>
                <h2 class="text-xl font-bold mb-2">Manager Access</h2>
                <input type="password" id="admin-pass" placeholder="Enter Access Code" class="w-full p-3 border rounded-xl mb-4 text-center outline-none focus:border-green-500">
                <button onclick="checkAdmin()" class="w-full bg-gray-900 text-white py-3 rounded-xl font-bold">Login</button>
            </div>
            <div id="admin-dashboard" class="hidden space-y-6">
                <div class="flex justify-between items-end">
                    <h2 class="text-2xl font-black italic uppercase tracking-tighter">Game Attendance</h2>
                    <button onclick="loadRoster()" class="text-green-600 text-xs font-bold uppercase"><i class="fas fa-sync-alt mr-1"></i> Refresh</button>
                </div>
                
                <div class="flex bg-gray-100 p-1 rounded-xl mb-4">
                    <button onclick="setStream('Wed')" id="admin-wed-toggle" class="flex-1 py-2 text-[10px] font-black uppercase rounded-lg bg-white shadow-sm">Wednesday List</button>
                    <button onclick="setStream('Sat')" id="admin-sat-toggle" class="flex-1 py-2 text-[10px] font-black uppercase text-gray-400">Saturday List</button>
                </div>

                <div id="roster-container" class="space-y-4">
                    <p class="text-center text-gray-400 py-10">Loading RSVP data...</p>
                </div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex justify-around items-center p-3 z-50 shadow-lg">
        <button onclick="showPage('home')" id="btn-home" class="nav-btn flex flex-col items-center gap-1 text-green-600">
            <i class="fas fa-home text-xl"></i>
            <span class="text-[10px] font-bold">Home</span>
        </button>
        <button onclick="showPage('teams')" id="btn-teams" class="nav-btn flex flex-col items-center gap-1 text-gray-400">
            <i class="fas fa-users text-xl"></i>
            <span class="text-[10px] font-bold">Teams</span>
        </button>
        <button onclick="showPage('schedule')" id="btn-schedule" class="nav-btn flex flex-col items-center gap-1 text-gray-400">
            <i class="fas fa-calendar-alt text-xl"></i>
            <span class="text-[10px] font-bold">Schedule</span>
        </button>
        <button onclick="showPage('stats')" id="btn-stats" class="nav-btn flex flex-col items-center gap-1 text-gray-400">
            <i class="fas fa-chart-line text-xl"></i>
            <span class="text-[10px] font-bold">Stats</span>
        </button>
        <button onclick="showPage('admin')" id="btn-admin" class="nav-btn flex flex-col items-center gap-1 text-gray-400">
            <i class="fas fa-user-shield text-xl"></i>
            <span class="text-[10px] font-bold">Admin</span>
        </button>
    </nav>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyulVe10aCjZBt2A7_78iJdHLetx2r74PBFcxo5yuPkMQPRG6AZz_YY5iCgULKAQov-/exec'; 
        let allPlayersData = []; 
        let currentStream = 'Wed';

        function toggleMenu() { document.getElementById('side-menu').classList.toggle('hidden'); }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-green-600');
                btn.classList.add('text-gray-400');
            });
            const activeBtn = document.getElementById('btn-' + pageId);
            if(activeBtn) {
                activeBtn.classList.remove('text-gray-400');
                activeBtn.classList.add('text-green-600');
            }
            document.getElementById('side-menu').classList.add('hidden');
            window.scrollTo(0, 0);

            if(pageId === 'home') loadSchedule();
            if(pageId === 'teams') loadTeamsData();
            if(pageId === 'schedule') loadSchedule();
            if(pageId === 'stats') loadStats();
            if(pageId === 'admin' && !document.getElementById('admin-dashboard').classList.contains('hidden')) loadRoster();
        }

        function getDynamicTeamColor(teamName, jerseyString) {
            if (!teamName || !jerseyString) return 'text-gray-800';
            const name = teamName.trim().toUpperCase();
            const jerseyText = jerseyString.toUpperCase();
            const teamLetter = name.replace('TEAM', '').trim(); 
            const segments = jerseyText.split('|');
            for (let segment of segments) {
                const letterMatch = new RegExp(`\\b${teamLetter}\\b`).test(segment);
                if (letterMatch) {
                    if (segment.includes('BLUE')) return 'text-blue-600';
                    if (segment.includes('YELLOW')) return 'text-yellow-500';
                }
            }
            return 'text-gray-800';
        }

        function formatSafe(val) {
            if (!val) return 'TBA';
            let d = new Date(val);
            if (isNaN(d.getTime())) return val;
            return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: '2-digit' });
        }

        function formatTime(val) {
            if (!val) return 'TBA';
            let d = new Date(val);
            if (isNaN(d.getTime())) return val;
            return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
        }

        async function loadSchedule() {
            const container = document.getElementById('schedule-container');
            const homeMatchups = document.getElementById('next-game-matchups');
            const rsvpControls = document.getElementById('rsvp-controls');
            const rsvpHeader = document.getElementById('rsvp-header');
            const rsvpDot = document.getElementById('rsvp-dot');
            
            if(container) container.innerHTML = '<p class="text-center text-gray-400 py-10">Updating Schedule...</p>';
            
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getGames`);
                const games = await res.json();
                
                if(games && games.length > 0) {
                    const now = new Date();
                    now.setHours(0, 0, 0, 0);

                    let nextGame = games.find(g => {
                        let gDate = new Date(g.date);
                        return gDate >= now;
                    });

                    if(nextGame) {
                        const loc = nextGame.location || nextGame.Location || nextGame.venue || nextGame.Venue || 'TBA';
                        const jerseyInfo = nextGame.jersey || "";
                        document.getElementById('next-game-date').innerText = formatSafe(nextGame.date);
                        document.getElementById('next-game-loc').innerText = `${formatTime(nextGame.time)} @ ${loc}`;
                        document.getElementById('next-game-jersey').innerHTML = `<i class="fas fa-tshirt mr-1"></i> Jersey: ${jerseyInfo || 'TBA'}`;
                        
                        const matches = (nextGame.matchup || "TBA vs TBA").split(' | ');
                        homeMatchups.innerHTML = matches.map(m => {
                            const parts = m.split(' vs ');
                            const t1 = parts[0] ? parts[0].trim() : 'TBA';
                            const t2 = parts[1] ? parts[1].trim() : 'TBA';
                            return `<div class="bg-gray-50 rounded-xl p-2 flex items-center justify-around border border-gray-100 font-black text-[10px] uppercase tracking-tighter">
                                <span class="${getDynamicTeamColor(t1, jerseyInfo)}">${t1}</span>
                                <span class="text-gray-300 italic px-2 text-[8px]">VS</span>
                                <span class="${getDynamicTeamColor(t2, jerseyInfo)}">${t2}</span>
                            </div>`;
                        }).join('');
                        
                        rsvpControls.style.display = 'grid';
                        rsvpHeader.innerText = "Live RSVP";
                        rsvpDot.classList.add('bg-green-500', 'animate-pulse');
                    } else {
                        document.getElementById('next-game-date').innerText = "No Games Scheduled";
                        document.getElementById('next-game-loc').innerText = "Check back soon!";
                        homeMatchups.innerHTML = "";
                        document.getElementById('next-game-jersey').innerHTML = "";
                        rsvpControls.style.display = 'none';
                        rsvpHeader.innerText = "Off Season";
                        rsvpDot.classList.remove('bg-green-500', 'animate-pulse');
                        rsvpDot.classList.add('bg-gray-300');
                    }

                    if(container) {
                        container.innerHTML = games.map(g => {
                            const loc = g.location || g.Location || g.venue || g.Venue || 'TBA';
                            const jerseyInfo = g.jersey || "";
                            const teams = (g.matchup || "TBA vs TBA").split(' | ');
                            return `<div class="bg-white p-5 rounded-3xl shadow-sm border border-green-100">
                                <div class="flex justify-between items-start mb-1">
                                    <p class="text-lg font-black text-gray-800">${formatSafe(g.date)}</p>
                                    <div class="text-right"><p class="text-xs font-bold text-green-700">${formatTime(g.time)}</p></div>
                                </div>
                                <p class="text-[10px] text-gray-400 font-bold uppercase mb-3"><i class="fas fa-map-marker-alt mr-1"></i> ${loc}</p>
                                <div class="space-y-2">${teams.map(t => {
                                    const parts = t.split(' vs ');
                                    const t1 = parts[0] ? parts[0].trim() : 'TBA';
                                    const t2 = parts[1] ? parts[1].trim() : 'TBA';
                                    return `<div class="bg-gray-50 rounded-2xl p-3 flex items-center justify-around border border-gray-100 font-black text-[10px] uppercase tracking-tighter">
                                        <span class="${getDynamicTeamColor(t1, jerseyInfo)}">${t1}</span>
                                        <span class="text-gray-300 italic px-2">VS</span>
                                        <span class="${getDynamicTeamColor(t2, jerseyInfo)}">${t2}</span>
                                    </div>`;
                                }).join('')}</div>
                            </div>`}).join('');
                    }
                }
            } catch(e) { if(container) container.innerHTML = 'Error loading games.'; }
        }

        async function loadTeamsData() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getPlayers`);
                allPlayersData = await res.json();
                renderTeams();
            } catch(e) { console.error(e); }
        }

        function setStream(stream) {
            currentStream = stream;
            document.getElementById('btn-wed-toggle').className = stream === 'Wed' ? "flex-1 py-2 text-[10px] font-black uppercase rounded-lg bg-white shadow-sm transition-all" : "flex-1 py-2 text-[10px] font-black uppercase text-gray-400";
            document.getElementById('btn-sat-toggle').className = stream === 'Sat' ? "flex-1 py-2 text-[10px] font-black uppercase rounded-lg bg-white shadow-sm transition-all" : "flex-1 py-2 text-[10px] font-black uppercase text-gray-400";
            const admWed = document.getElementById('admin-wed-toggle');
            const admSat = document.getElementById('admin-sat-toggle');
            if(admWed && admSat) {
                admWed.className = stream === 'Wed' ? "flex-1 py-2 text-[10px] font-black uppercase rounded-lg bg-white shadow-sm" : "flex-1 py-2 text-[10px] font-black uppercase text-gray-400";
                admSat.className = stream === 'Sat' ? "flex-1 py-2 text-[10px] font-black uppercase rounded-lg bg-white shadow-sm" : "flex-1 py-2 text-[10px] font-black uppercase text-gray-400";
            }
            renderTeams();
            if(!document.getElementById('admin-dashboard').classList.contains('hidden')) loadRoster();
        }

        function renderTeams() {
            const filter = document.getElementById('team-filter').value;
            const container = document.getElementById('teams-grid');
            const teamNames = ["Team A", "Team B", "Team C", "Team D"];
            const teamField = currentStream === 'Wed' ? 'team wed' : 'team sat';
            const dayMatch = currentStream === 'Wed' ? 'Wednesday' : 'Saturday';
            
            container.innerHTML = teamNames.filter(t => filter === "All" || filter === t).map(teamName => {
                const teamPlayers = allPlayersData.filter(p => 
                    p[teamField] === teamName && 
                    (p.stream === dayMatch || p.stream === 'Both')
                );
                return `<div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="px-5 py-4 border-b border-gray-50 flex justify-between items-center bg-gray-50/30">
                        <span class="font-black text-gray-800 uppercase italic tracking-tighter">${teamName}</span>
                    </div>
                    <div class="divide-y divide-gray-50">
                        ${teamPlayers.length > 0 
                            ? teamPlayers.map(p => `<div class="p-4 flex items-center gap-4"><p class="font-bold text-gray-800 text-sm">${p.name || p.Name}</p></div>`).join('')
                            : `<div class="p-4 text-gray-400 text-xs italic text-center">No players assigned</div>`
                        }
                    </div>
                </div>`;
            }).join('');
        }

        async function loadStats() {
            const container = document.getElementById('stats-container');
            container.innerHTML = '<p class="text-center text-gray-400 py-10">Fetching Top Scorers...</p>';
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getStats`);
                let stats = await res.json();
                stats.sort((a, b) => (parseInt(b.goals) || 0) - (parseInt(a.goals) || 0));
                const maxGoals = stats.length > 0 ? (parseInt(stats[0].goals) || 1) : 1;

                container.innerHTML = stats.map((s, index) => {
                    const goals = parseInt(s.goals) || 0;
                    const percentage = (goals / maxGoals) * 100;
                    let rankBadge = index === 0 ? 'bg-yellow-400' : (index === 1 ? 'bg-gray-300' : (index === 2 ? 'bg-orange-400' : 'bg-gray-100'));
                    
                    return `<div class="relative bg-white p-4 rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                        <div class="absolute bottom-0 left-0 h-1 bg-green-500/10" style="width: ${percentage}%"></div>
                        <div class="flex justify-between items-center relative z-10">
                            <div class="flex items-center gap-4">
                                <span class="w-6 h-6 ${rankBadge} flex items-center justify-center rounded-full text-[10px] font-black">${index + 1}</span>
                                <div>
                                    <p class="font-black text-gray-800 uppercase tracking-tight text-sm">${s.name || s.player || 'Unknown'}</p>
                                    <p class="text-[9px] font-bold text-gray-400 uppercase">${s.team || 'Active Player'}</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <span class="text-xl font-black text-green-600">${goals}</span>
                                <span class="text-[8px] font-black text-gray-400 uppercase block leading-none">Goals</span>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            } catch(e) { container.innerHTML = 'Error loading stats.'; }
        }

        async function submitRSVP(status) {
            const gameDate = document.getElementById('next-game-date').innerText;
            if(gameDate === "No Games Scheduled") return;
            
            const email = prompt("Enter your email to confirm:");
            if(!email) return;

            const payload = {
                action: 'submitRSVP',
                email: email.toLowerCase().trim(),
                status: status,
                gameDate: gameDate
            };

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                alert(`You are marked as ${status.toUpperCase()} for ${gameDate}!`);
            } catch (e) {
                alert("Submit failed, please try again.");
            }
        }

        function checkAdmin() {
            if(document.getElementById('admin-pass').value === '1234') {
                document.getElementById('admin-login-view').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                loadRoster();
            } else { alert("Access Denied"); }
        }

        async function loadRoster() {
            const container = document.getElementById('roster-container');
            container.innerHTML = '<p class="text-center text-gray-400 py-10">Refreshing attendance...</p>';
            try {
                const [pRes, rRes] = await Promise.all([
                    fetch(`${SCRIPT_URL}?action=getPlayers`),
                    fetch(`${SCRIPT_URL}?action=getRSVPs`)
                ]);
                const players = await pRes.json();
                const rsvps = await rRes.json();

                const teamNames = ["Team A", "Team B", "Team C", "Team D"];
                const teamField = currentStream === 'Wed' ? 'team wed' : 'team sat';
                const dayMatch = currentStream === 'Wed' ? 'Wednesday' : 'Saturday';
                
                container.innerHTML = teamNames.map(team => {
                    const playersInTeam = players.filter(p => 
                        p[teamField] === team && 
                        (p.stream === dayMatch || p.stream === 'Both')
                    );

                    return `<div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden mb-4">
                        <div class="bg-gray-900 text-white px-5 py-3 flex justify-between items-center">
                            <span class="font-black italic text-sm uppercase">${team}</span>
                        </div>
                        <div class="divide-y divide-gray-50">
                            ${playersInTeam.length > 0 ? playersInTeam.map(p => {
                                const playerEmail = (p.email || p.Email || "").toLowerCase().trim();
                                const userRSVP = rsvps.filter(r => (r.email || r.Email || "").toLowerCase().trim() === playerEmail).reverse()[0];
                                const status = userRSVP ? userRSVP.status || userRSVP.Status : 'Pending';
                                const color = status === 'In' ? 'text-green-600 bg-green-50' : (status === 'Out' ? 'text-red-600 bg-red-50' : 'text-gray-400 bg-gray-50');

                                return `<div class="p-4 flex justify-between items-center">
                                    <span class="font-bold text-sm">${p.name || p.Name}</span>
                                    <span class="text-[9px] font-black uppercase px-3 py-1 rounded-full ${color}">${status}</span>
                                </div>`;
                            }).join('') : `<p class="p-4 text-xs italic text-gray-400">No players assigned</p>`}
                        </div>
                    </div>`;
                }).join('');

            } catch(e) { container.innerHTML = 'Error.'; }
        }

        window.onload = loadSchedule;
    </script>
</body>
</html>
